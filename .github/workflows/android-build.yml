name: Android CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-build:
    name: Test and Build Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build debug APK (PR-safe)
        if: github.event_name == 'pull_request'
        run: flutter build apk --debug

      - name: Prepare Android signing files
        if: github.event_name != 'pull_request'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            CLEAN_KEYSTORE_BASE64="$(printf "%s" "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n\t ')"
            if ! printf "%s" "$CLEAN_KEYSTORE_BASE64" | base64 --decode --ignore-garbage > android/upload-keystore.jks; then
              echo "Invalid ANDROID_KEYSTORE_BASE64 secret. Recreate it from the .jks file."
              exit 1
            fi
            printf "%s\n" \
              "storePassword=$ANDROID_STORE_PASSWORD" \
              "keyPassword=$ANDROID_KEY_PASSWORD" \
              "keyAlias=$ANDROID_KEY_ALIAS" \
              "storeFile=upload-keystore.jks" \
              > android/key.properties
          else
            echo "No Android signing secrets configured. Continuing with fallback signing."
          fi

      - name: Build release APK
        if: github.event_name != 'pull_request'
        run: flutter build apk --release

      - name: Build release AAB
        if: github.event_name != 'pull_request'
        run: flutter build appbundle --release

      - name: Upload debug APK artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload release artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: android-release-artifacts
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
